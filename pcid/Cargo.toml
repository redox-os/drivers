[package]
name = "pcid"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "pcid"

[lib]
name = "pcid_lib"

[dependencies]
arrayvec = "0.7"
bincode = "1.2"
bitflags = "1"
log = "0.4"
pico-args = { version = "0.4", features = ["combined-flags"] }
plain = "0.2"
redox-log = "0.1"
redox_syscall = "0.2.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
smallvec = "1"
thiserror = "1"
