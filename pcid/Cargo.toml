[package]
name = "pcid"
version = "0.1.0"
edition = "2018"

[[bin]]
name = "pcid"
path = "src/main.rs"

[lib]
name = "pcid_interface"
path = "src/lib.rs"

[dependencies]
arrayvec = "0.5"
bincode = "1.2"
bitflags = "1"
clap = "2.33"
either = "1.5"
futures = "0.3"
libc = "0.2"
log = "0.4"
once_cell = "1.4"
plain = "0.2"
redox-iou = { git = "https://gitlab.redox-os.org/redox-os/redox-iou.git" }
redox-buffer-pool = { version = "0.2", features = ["redox"] }
#redox-iou = { path = "/home/me/Projects/redox-iou" }
redox-log = { git = "https://gitlab.redox-os.org/redox-os/redox-log.git", tag = "v0.1.1" }
#redox_syscall = { git = "https://gitlab.redox-os.org/redox-os/syscall.git" }
redox_syscall = { git = "https://gitlab.redox-os.org/4lDO2/syscall.git", branch = "io_uring" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
smallvec = "1"
thiserror = "1"
toml = "0.5"
