[package]
name = "nvmed"
version = "0.1.0"
edition = "2018"

[dependencies]
arrayvec = "0.7"
bitflags = "2"
log = "0.4"
redox-daemon = "0.1"
redox_event = "0.4.1"
redox-log = "0.1"
redox_syscall = { version = "0.5", features = ["std"] }
redox-scheme = { git = "https://gitlab.redox-os.org/redox-os/redox-scheme.git", branch = "asyncv2" }
partitionlib = { git = "https://gitlab.redox-os.org/redox-os/partitionlib.git" }
smallvec = "1"

executor = { path = "../../executor" }
common = { path = "../../common" }
driver-block = { path = "../driver-block" }
pcid = { path = "../../pcid" }
libredox = "0.1.3"
parking_lot = "0.12.1"

[features]
default = ["async"]
async = []
